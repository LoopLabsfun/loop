# Drives the autonomous agent on a finer cadence than Vercel Hobby allows.
#
# Vercel Hobby permits a single DAILY cron (see vercel.json), which is too slow
# for a live token with holders watching the build log. GitHub Actions `schedule`
# is free and runs at 5-min granularity (GitHub's floor), hitting the same
# protected endpoint — the daily Vercel cron stays as a backstop. The endpoint is
# bounded per run (MAX_PER_RUN) and budget-gated (empty treasury ⇒ the project
# sleeps), so a tighter cadence can't run away on cost.
#
# Founder setup (one-time, in repo Settings → Secrets and variables → Actions):
#   - secret  CRON_SECRET   — same value as the Vercel CRON_SECRET env var
#   - variable AGENT_CRON_URL — e.g. https://looplabs.fun/api/agent/cron
#     (the apex is canonical; a leading www. is stripped below since www 308-
#     redirects to apex and curl would drop the auth header across that hop)
# If either is unset the job no-ops cleanly instead of failing the workflow.

name: agent-cron

on:
  schedule:
    # Every 30 minutes. This is the SOLE heartbeat (the Vercel cron was removed).
    # The real spend throttle is the CODE cooldown (lib/agent-tick-throttle.ts,
    # AGENT_TICK_COOLDOWN_MIN, default 60) — the cron just has to fire often enough
    # to notice when that cooldown expires. */30 keeps per-fire overhead low (each
    # fire runs governance + a mainnet creator-fee claim), while the cooldown bounds
    # the Claude-credit burn rate. GitHub throttles scheduled runs, so effective
    # cadence is ~30–45 min. AGENT_PAUSED (env + redeploy) is the instant hard stop.
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # allow a manual tick from the Actions tab

concurrency:
  # Never overlap ticks: a slow run is skipped, not stacked.
  group: agent-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Tick funded projects
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AGENT_CRON_URL: ${{ vars.AGENT_CRON_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$AGENT_CRON_URL" ]; then
            echo "CRON_SECRET secret or AGENT_CRON_URL variable not set — skipping."
            exit 0
          fi
          # Hit the apex directly: www.looplabs.fun 308-redirects to looplabs.fun,
          # and curl drops the Authorization header across that host change (→ 401).
          # Stripping a leading www. avoids the redirect so the secret is preserved.
          URL=$(printf '%s' "$AGENT_CRON_URL" | sed 's#://www\.#://#')
          echo "Ticking $URL"
          code=$(curl -fsS -o /tmp/tick.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL") || true
          echo "HTTP $code"
          cat /tmp/tick.json 2>/dev/null || true
          # A 503 means the runtime isn't configured yet (no ANTHROPIC_API_KEY) —
          # that's an expected idle state, not a CI failure. Only hard-fail on 5xx
          # that isn't 503, or on a transport error (empty code).
          if [ -z "$code" ]; then echo "transport error"; exit 1; fi
          if [ "$code" -ge 500 ] && [ "$code" -ne 503 ]; then exit 1; fi
