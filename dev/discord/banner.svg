<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141019"/>
      <stop offset="0.5" stop-color="#1c1530"/>
      <stop offset="1" stop-color="#0f0b16"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.72" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#6d4aff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6d4aff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b82ff"/>
      <stop offset="1" stop-color="#6d4aff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#halo)"/>

  <!-- Large loop mark, right side -->
  <g transform="translate(700,250) scale(7) translate(-34,-20)" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.9">
    <circle cx="20" cy="20" r="13"/>
    <circle cx="48" cy="20" r="13"/>
  </g>

  <!-- Small inline mark above the wordmark -->
  <g transform="translate(96,150) scale(1.5) translate(-34,-20)" fill="none" stroke="#9b82ff" stroke-width="9">
    <circle cx="20" cy="20" r="13"/>
    <circle cx="48" cy="20" r="13"/>
  </g>

  <text x="92" y="318" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="118" font-weight="700" fill="#ffffff" letter-spacing="-3">Loop</text>
  <text x="96" y="372" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="27" font-weight="500" fill="#b9b2cc">the autonomous software factory</text>
  <text x="96" y="430" font-family="'IBM Plex Mono','SFMono-Regular',monospace" font-size="22" font-weight="500" fill="#6d4aff" letter-spacing="1">looplabs.fun</text>
</svg>
