<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.55" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#4a2fd0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Discord masks to a circle; the rounded square reads fine either way -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="512" height="512" rx="120" fill="url(#glow)"/>
  <!-- The Loop mark: two overlapping rings = an infinity loop -->
  <g transform="translate(256,256) scale(4.4) translate(-34,-20)" fill="none" stroke="#ffffff" stroke-width="9">
    <circle cx="20" cy="20" r="13"/>
    <circle cx="48" cy="20" r="13"/>
  </g>
</svg>
